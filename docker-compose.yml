# =============================================================================
# MLB Win Probability — Docker Compose
#
# Usage
# -----
#   docker compose up --build          # first run (builds image)
#   docker compose up -d               # detached / daemon mode
#   docker compose logs -f winprob     # follow logs
#   docker compose down                # stop and remove container
#
# Environment overrides (prefix with `MODEL=xgboost docker compose up`)
#   MODEL  — model type: logistic | lightgbm | xgboost | catboost | mlp | stacked (default: stacked)
#   PORT   — host port to expose the dashboard on (default: 8087)
#
# Data persistence
# ----------------
# ./data  is mounted at /app/data   inside the container.
# ./logs  is mounted at /app/logs   inside the container.
# Both directories are created automatically by Docker Compose on first run.
# Deleting ./data/models/ forces a full re-ingest and re-train on next start.
#
# Chat / LLM
# -----------
# The chat feature requires the Ollama service below.  On first start, pull
# the default model:
#   docker exec mlb-ollama ollama pull qwen2.5:7b
# The model is persisted in the ollama_data volume across restarts.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — local LLM backend for the chat feature
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: mlb-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    mem_limit: 6g
    cpus: 6
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Win Probability dashboard
  # ---------------------------------------------------------------------------
  winprob:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
    image: mlb-winprob:latest
    container_name: mlb-winprob
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${PORT:-30087}:30087"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      GIT_COMMIT: "${GIT_COMMIT:-unknown}"
      MODEL: "${MODEL:-stacked}"
      PORT: "30087"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "qwen2.5:7b"
    restart: no
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30087/api/seasons"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  ollama_data:
