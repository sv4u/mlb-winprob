# =============================================================================
# MLB Win Probability — Docker Compose
#
# Usage
# -----
#   docker compose up --build          # first run (builds image)
#   docker compose up -d               # detached / daemon mode
#   docker compose logs -f winprob     # follow logs
#   docker compose down                # stop and remove container
#
# Environment overrides (prefix with `MODEL=xgboost docker compose up`)
#   MODEL  — model type: logistic | lightgbm | xgboost | catboost | mlp | stacked (default: stacked)
#   PORT   — host port to expose the dashboard on (default: 30087)
#
# Data persistence
# ----------------
# ./data  is mounted at /app/data   inside the container.
# ./logs  is mounted at /app/logs   inside the container.
# Both directories are created automatically by Docker Compose on first run.
# Deleting ./data/models/ forces a full re-ingest and re-train on next start.
#
# Chat / LLM
# -----------
# The ollama-init service automatically pulls the chat models on first start.
# Models are persisted in the ollama_data volume across restarts — subsequent
# starts skip the download.  Default: llama3.1:8b (primary), mistral:7b (alt).
# Override via OLLAMA_CHAT_MODEL / OLLAMA_CHAT_MODEL_ALT env vars.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — local LLM backend for the chat feature
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: mlb-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    mem_limit: 8g
    cpus: 6
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "6"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Ollama init — auto-pull chat models (runs once, then exits)
  #
  # On first start this downloads the models (~5 GB each).  The ollama_data
  # volume caches them so subsequent starts complete in seconds.
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: mlb-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "${OLLAMA_CHAT_MODEL:-llama3.1:8b}"
      OLLAMA_CHAT_MODEL_ALT: "${OLLAMA_CHAT_MODEL_ALT:-mistral:7b}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[ollama-init] Pulling primary chat model (llama3.1:8b)..."
        ollama pull ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
        echo "[ollama-init] Pulling alternative chat model (mistral:7b)..."
        ollama pull ${OLLAMA_CHAT_MODEL_ALT:-mistral:7b}
        echo "[ollama-init] All chat models ready."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Win Probability dashboard
  # ---------------------------------------------------------------------------
  winprob:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
    image: mlb-winprob:latest
    container_name: mlb-winprob
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "${PORT:-30087}:30087"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      GIT_COMMIT: "${GIT_COMMIT:-unknown}"
      MODEL: "${MODEL:-stacked}"
      PORT: "30087"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "${OLLAMA_CHAT_MODEL:-llama3.1:8b}"
      OLLAMA_CHAT_MODEL_ALT: "${OLLAMA_CHAT_MODEL_ALT:-mistral:7b}"
      WINPROB_VERBOSE: true
      WINPROB_LOG_LEVEL: "DEBUG"
      WINPROB_LOG_FORMAT: "human"
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30087/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  ollama_data:
