# =============================================================================
# MLB Prediction System — Docker Compose
#
# Usage
# -----
#   docker compose up --build          # first run (builds image)
#   docker compose up -d               # detached / daemon mode
#   docker compose logs -f mlb-predict     # follow logs
#   docker compose down                # stop and remove container
#
# Environment overrides (prefix with `MODEL=xgboost docker compose up`)
#   MODEL               — model type: logistic | lightgbm | xgboost | catboost | mlp | stacked (default: stacked)
#   PORT                — host port to expose the dashboard on (default: 30087)
#   LAN access          — publishes on 0.0.0.0 so other devices (e.g. http://192.168.x.x:30087/)
#                         can reach the host. If unreachable, check macOS Firewall (allow Docker/incoming)
#                         and Docker Desktop → Settings that allow the VM to accept LAN connections.
#   MEM_LIMIT           — container memory limit (default: 4g). Override e.g. MEM_LIMIT=3g if the host is tight on RAM.
#   CPUS                — container CPU limit (default: 2)
#   MLB_PREDICT_LIVE_API — set to 0 to disable live MLB/Odds API calls at runtime (minimize network; see README)
#
# Data persistence
# ----------------
# ./data  is mounted at /app/data   inside the container.
# ./logs  is mounted at /app/logs   inside the container.
# Both directories are created automatically by Docker Compose on first run.
# Deleting ./data/models/ forces a full re-ingest and re-train on next start.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MLB Prediction System dashboard
  # ---------------------------------------------------------------------------
  mlb-predict:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
        TORCH_SOURCE: "${TORCH_SOURCE:-0}"
    image: mlb-predict:latest
    container_name: mlb-predict
    ports:
      # Bind on all host interfaces (LAN + localhost), not only loopback
      - "0.0.0.0:${PORT:-30087}:30087"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # GIT_COMMIT is omitted here so the baked /app/GIT_COMMIT from the image is used.
      # To override: `GIT_COMMIT=abc1234 docker compose up` (pass-through not listed;
      # add `GIT_COMMIT: ${GIT_COMMIT}` if you need it in compose).
      MODEL: "${MODEL:-stacked}"
      PORT: "30087"
      # Belt-and-suspenders with serve.py defaults (supervisord already passes --host 0.0.0.0)
      MLB_PREDICT_LISTEN_ALL: "1"
      MLB_PREDICT_VERBOSE: true
      MLB_PREDICT_LOG_LEVEL: "DEBUG"
      MLB_PREDICT_LOG_FORMAT: "human"
      # Set to "0" to disable live MLB Stats API and Odds API calls (minimize network footprint)
      MLB_PREDICT_LIVE_API: "${MLB_PREDICT_LIVE_API:-1}"
    mem_limit: ${MEM_LIMIT:-4g}
    cpus: ${CPUS:-2}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-4g}
          cpus: "${CPUS:-2}"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:30087/api/health | grep -q version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
