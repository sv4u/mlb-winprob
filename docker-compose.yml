# =============================================================================
# MLB Prediction System — Docker Compose
#
# Usage
# -----
#   docker compose up --build          # first run (builds image)
#   docker compose up -d               # detached / daemon mode
#   docker compose logs -f mlb-predict     # follow logs
#   docker compose down                # stop and remove container
#
# Environment overrides (prefix with `MODEL=xgboost docker compose up`)
#   MODEL               — model type: logistic | lightgbm | xgboost | catboost | mlp | stacked (default: stacked)
#   PORT                — host port to expose the dashboard on (default: 30087)
#   MEM_LIMIT           — container memory limit (default: 2560m). Reduce to 1536m after bootstrap if memory is tight.
#   CPUS                — container CPU limit (default: 2)
#   MLB_PREDICT_LIVE_API — set to 0 to disable live MLB/Odds API calls at runtime (minimize network; see README)
#
# Data persistence
# ----------------
# ./data  is mounted at /app/data   inside the container.
# ./logs  is mounted at /app/logs   inside the container.
# Both directories are created automatically by Docker Compose on first run.
# Deleting ./data/models/ forces a full re-ingest and re-train on next start.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MLB Prediction System dashboard
  # ---------------------------------------------------------------------------
  mlb-predict:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
    image: mlb-predict:latest
    container_name: mlb-predict
    ports:
      - "${PORT:-30087}:30087"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      GIT_COMMIT: "${GIT_COMMIT:-unknown}"
      MODEL: "${MODEL:-stacked}"
      PORT: "30087"
      MLB_PREDICT_VERBOSE: true
      MLB_PREDICT_LOG_LEVEL: "DEBUG"
      MLB_PREDICT_LOG_FORMAT: "human"
      # Set to "0" to disable live MLB Stats API and Odds API calls (minimize network footprint)
      MLB_PREDICT_LIVE_API: "${MLB_PREDICT_LIVE_API:-1}"
    restart: unless-stopped
    mem_limit: ${MEM_LIMIT:-2560m}
    cpus: ${CPUS:-2}
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-2560m}
          cpus: "${CPUS:-2}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30087/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
