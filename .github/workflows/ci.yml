name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:

# Cancel in-progress runs for the same branch/PR to avoid wasting minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Permissions
#   contents: read   — checkout
#   packages: write  — push image to GitHub Container Registry (GHCR)
#                      (only used by the docker job; skipped on PRs)
# ---------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff check + format (native, fast feedback)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Type check — mypy on source package only (native, fast feedback)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: mypy
        run: uv run mypy src/mlb_predict

  # ---------------------------------------------------------------------------
  # Tests — pytest across Python 3.11 and 3.12 (native, preserves matrix)
  # ---------------------------------------------------------------------------
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: pytest
        run: uv run pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker — build image and publish to GHCR
  #
  # Depends on all quality-gate jobs so the image is pushed only after the
  # full native test suite passes.
  #
  # Multi-platform strategy:
  #   • PRs         → linux/amd64 only, no push (fast validation)
  #   • push main   → linux/amd64 only, pushed to GHCR (fast iteration)
  #   • version tag → linux/amd64 + linux/arm64, pushed (full release)
  #
  # arm64 via QEMU emulation is slow (~5–8 min extra), so it only runs on
  # tagged releases where the multi-arch image is needed for ARM deployment.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker — build & publish
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # QEMU — only needed for arm64 cross-compilation on version tags
      # -----------------------------------------------------------------------
      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-qemu-action@v3

      # -----------------------------------------------------------------------
      # Docker Buildx — enables BuildKit cache export and multi-platform builds
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Log in to GHCR
      # Skipped on pull_request events (fork PRs cannot access secrets anyway).
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Compute tags and OCI labels from git context
      #   branch push → ghcr.io/<repo>:main, ghcr.io/<repo>:sha-<short>
      #   tag push    → ghcr.io/<repo>:1.2.3, ghcr.io/<repo>:1.2
      #   PR          → ghcr.io/<repo>:pr-<N>  (image never pushed)
      # -----------------------------------------------------------------------
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      # Build and push the production image.
      #
      # Platform strategy:
      #   PR builds    → linux/amd64 only, TORCH_SOURCE=0 (fast validation)
      #   push to main → linux/amd64 only, TORCH_SOURCE=1 (pushed to GHCR)
      #   version tag  → linux/amd64 + linux/arm64, TORCH_SOURCE=1 (full release)
      #
      # TORCH_SOURCE=1 builds PyTorch from source targeting SSE4.2 so the
      # image runs on all x86-64 CPUs (including NAS devices without AVX2).
      # The pytorch-builder layer is cached by GHA cache — only the first
      # build (or PYTORCH_VERSION bumps) pays the ~30-90 min compile cost.
      # -----------------------------------------------------------------------
      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            TORCH_SOURCE=${{ github.event_name != 'pull_request' && '1' || '0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
