<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — MLB Win Probability</title>
  <link rel="stylesheet" href="/static/base.css" />
  <style>
    .chat-layout {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 120px);
      min-height: 400px;
    }

    .chat-status {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chat-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .chat-status.ready .dot {
      background: var(--green);
    }

    .chat-status.error .dot {
      background: var(--red);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .chat-msg {
      margin-bottom: 1rem;
    }

    .chat-msg.user {
      text-align: right;
    }

    .chat-msg.user .bubble {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 0.5rem 0.85rem;
      border-radius: 12px 12px 4px 12px;
      max-width: 85%;
      font-size: 0.9rem;
    }

    .chat-msg.assistant .bubble {
      display: inline-block;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 0.5rem 0.85rem;
      border-radius: 12px 12px 12px 4px;
      max-width: 85%;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg .role {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .chat-input-row {
      display: flex;
      gap: 0.5rem;
    }

    .chat-input-row input {
      flex: 1;
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }

    .chat-input-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .chat-input-row button {
      padding: 0.6rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .chat-input-row button:hover {
      filter: brightness(1.1);
    }

    .chat-input-row button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a href="/" class="logo">⚾ MLB Win Probability</a>
    <span class="meta">Chat</span>
    <code class="git-hash">{{ git_commit }}</code>
    <button class="hamburger" onclick="toggleMobileNav()" aria-label="Menu">☰</button>
    <nav class="site-nav">
      <a href="/">All Seasons</a>
      <a href="/season/2026">2026 Season</a>
      <a href="/standings">Standings</a>
      <a href="/odds">Odds Hub</a>
      <a href="/wiki">Wiki</a>
      <a href="/chat" class="active">Chat</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/sitemap">Sitemap</a>
      <div class="model-selector">
        <span>Model:</span>
        <select id="model-select">
          <option value="logistic">Logistic</option>
          <option value="lightgbm">LightGBM</option>
          <option value="xgboost">XGBoost</option>
          <option value="catboost">CatBoost</option>
          <option value="mlp">MLP</option>
          <option value="stacked">Stacked</option>
        </select>
        <span id="model-switching" class="switching" style="display:none">switching…</span>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="chat-layout">
      <div id="chat-status" class="chat-status">
        <span class="dot"></span>
        <span id="chat-status-text">Checking…</span>
        <select id="llm-model-select" title="Chat LLM model"
          style="margin-left:auto;font-size:0.78rem;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);">
          <option value="">Default</option>
          <option value="llama3.1:8b">Llama 3.1 8B</option>
          <option value="mistral:7b">Mistral 7B</option>
        </select>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Ask about predictions, standings, upsets…" autocomplete="off" />
        <button type="button" id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const messagesEl = document.getElementById('chat-messages');
      const inputEl = document.getElementById('chat-input');
      const sendBtn = document.getElementById('chat-send');
      const statusEl = document.getElementById('chat-status');
      const statusText = document.getElementById('chat-status-text');
      const llmSelect = document.getElementById('llm-model-select');
      let sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
      let streaming = false;

      function setStatus(ready, text) {
        statusEl.classList.remove('ready', 'error');
        if (ready) statusEl.classList.add('ready');
        else statusEl.classList.add('error');
        statusText.textContent = text || (ready ? 'Ready' : 'Ollama unavailable');
      }

      async function checkStatus() {
        try {
          const r = await fetch('/api/chat/status');
          const d = await r.json();
          setStatus(d.ollama_available, d.ollama_available ? 'Ready • ' + (d.model || '') : 'Ollama not available');
        } catch (e) {
          setStatus(false, 'Could not reach server');
        }
      }

      function addMessage(role, content) {
        const msg = document.createElement('div');
        msg.className = 'chat-msg ' + role;
        const roleSpan = document.createElement('div');
        roleSpan.className = 'role';
        roleSpan.textContent = role === 'user' ? 'You' : 'Assistant';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        msg.appendChild(roleSpan);
        msg.appendChild(bubble);
        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      async function sendMessage() {
        const text = (inputEl.value || '').trim();
        if (!text || streaming) return;
        inputEl.value = '';
        sendBtn.disabled = true;
        streaming = true;
        addMessage('user', text);
        const bubble = addMessage('assistant', '');
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: sessionId, model: llmSelect.value || undefined })
          });
          if (!res.ok) {
            bubble.textContent = 'Request failed: ' + res.status;
            return;
          }
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          let buffer = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += dec.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                try {
                  const data = JSON.parse(line.slice(6));
                  if (data.content) bubble.textContent += data.content;
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                } catch (_) { }
              }
            }
          }
          if (buffer.startsWith('data: ')) {
            try {
              const data = JSON.parse(buffer.slice(6));
              if (data.content) bubble.textContent += data.content;
            } catch (_) { }
          }
        } catch (e) {
          bubble.textContent = 'Error: ' + e.message;
        } finally {
          streaming = false;
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      checkStatus();
    })();
  </script>
</body>

</html>
