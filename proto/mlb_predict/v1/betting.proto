syntax = "proto3";

package mlb_predict.v1;

service BettingService {
  rpc GetOdds(GetOddsRequest) returns (GetOddsResponse);
  rpc GetEVOpportunities(GetEVRequest) returns (GetEVResponse);
  rpc GetFuturesEV(GetFuturesEVRequest) returns (GetFuturesEVResponse);
  rpc GetGameOdds(GetGameOddsRequest) returns (GameOddsResponse);
}

message GetOddsRequest {
  optional int32 season = 1;
  optional string date = 2;
  optional string team = 3;
  repeated string sportsbooks = 4;
}

message GetOddsResponse {
  string json = 1;
}

message GetEVRequest {
  optional string date = 1;
  double min_edge = 2;
  repeated string bet_types = 3;
  repeated string sportsbooks = 4;
}

message EVOpportunity {
  int64 game_pk = 1;
  string home_team = 2;
  string away_team = 3;
  string game_time = 4;
  string bet_type = 5;
  string selection = 6;
  string sportsbook = 7;
  double odds = 8;
  double implied_prob = 9;
  double model_prob = 10;
  double edge = 11;
  double ev_per_unit = 12;
  double kelly_pct = 13;
  optional double line = 14;
}

message GetEVResponse {
  repeated EVOpportunity opportunities = 1;
}

message GetFuturesEVRequest {
  int32 season = 1;
  repeated string teams = 2;
}

message GetFuturesEVResponse {
  string json = 1;
}

message GetGameOddsRequest {
  int64 game_pk = 1;
}

message GameOddsResponse {
  string json = 1;
}
